spring:
  application:
    name: sportgear-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:sportgear;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      "[hibernate.format_sql]": true
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}

app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:sportgear-api}
      secret: ${JWT_SECRET:change-me-to-a-very-long-secret-at-least-32-bytes}
      access-token-expiry-minutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:30}
      reset-token-expiry-minutes: ${RESET_TOKEN_EXPIRY_MINUTES:15}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
